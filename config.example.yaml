# o-device-emulator configuration
#
# Copy this file to config.yaml and adjust for your lab environment, then run:
#   .venv/bin/python device_emulator_daemon.py --config config.yaml --dry-run
#
# The UDP discovery announce (port 29810) makes a device show up as adoptable
# ("Pending") in the controller. With the `adopt:` block below enabled, the
# emulator also drives the full adoption handshake over the TLS management
# channel and keeps the device "Connected" with periodic INFORM heartbeats
# (see doc/DEVICE_PROTOCOL.md §8). The full adoption path is confirmed for
# access points, switches, and gateways — each reported as compatible.

# The controller's management URL. Its host/port are used both to fetch the
# controller's ID (GET <controller_url>/api/info, unauthenticated) and as the
# destination for discovery announces. Must NOT be loopback - use a real
# LAN/host-only interface address reachable from wherever this daemon runs.
controller_url: https://192.168.56.1:8043

# Optional: persist device identity/uptime across daemon restarts.
state_file: data/device_state.json
persist: true

services:
  discovery_port: 29810
  discovery_interval: 10          # seconds between announces
  # Bind the announce socket to a specific host-facing source IP on
  # multi-homed hosts. Leave unset to let the OS choose.
  # discovery_bind_ip: 192.168.56.3
  # Send to the limited broadcast address instead of directly to
  # controller_url's host. Only useful if the controller's address isn't
  # known ahead of time; direct unicast (the default) is simpler for lab use
  # and is what was used during protocol verification.
  discovery_broadcast: false

# Adoption over the TLS management channel. When enabled, devices announce as
# adoptable; once an operator adopts one in the controller, the emulator
# completes the handshake to "Connected" and holds it online. Access points,
# switches, and gateways are all supported (each reported as compatible). The
# username / password must match what the operator enters when adopting (the
# default device credential is admin / admin).
adopt:
  enabled: false
  username: admin
  password: admin
  port: 29814                     # management (adopt) TCP port
  inform_interval: 10             # seconds between INFORM heartbeats once online


devices:
  - name: lab-eap-01
    type: ap
    model: EAP245
    model_version: "3.0"
    hardware_version: "3.0"
    firmware: "5.1.0 Build 20230101 Rel.12345"
    mac: 02:15:6D:00:00:20
    ip: 192.168.56.53
    # Wire the AP under the switch so it appears connected in the topology map.
    # `uplink` is the name of the upstream device; `uplink_port` is the port on
    # that upstream device this one plugs into (optional - auto-assigned if
    # omitted). Leave `uplink` unset for a standalone device.
    uplink: lab-switch-01
    uplink_port: 8

  - name: lab-switch-01
    type: switch
    model: TL-SG3210
    model_version: "1.0"
    hardware_version: "1.0"
    firmware: "1.0.0 Build 20230101 Rel.12345"
    mac: 02:15:6D:00:00:10
    ip: 192.168.56.60
    port_num: 10
    # The switch plugs into the gateway (topology root).
    uplink: lab-gateway-01
    uplink_port: 5

  - name: lab-gateway-01
    type: gateway
    model: ER605
    model_version: "1.0"
    hardware_version: "1.0"
    firmware: "1.0.0 Build 20230101 Rel.12345"
    mac: 02:15:6D:00:00:30
    ip: 192.168.56.70
    port_num: 5
